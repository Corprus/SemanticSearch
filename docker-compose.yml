services:
  database:
    image: postgres:16-alpine
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost" ]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    env_file:
      - ./.env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq_volume:/var/lib/rabbitmq
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    working_dir: /semantic-search
    build: ./app
    env_file:
      - ./.env
    volumes:
      - ./app:/semantic-search/app
      - ./common:/semantic-search/common
    environment:
      - PYTHONPATH=/semantic-search
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

    expose:
      - ${APP_PORT}
    # Раскомментить для прямого дебага без nginx
    #ports:
    #  - "8000:8000"
    #Тут healthcheck для самого приложения, для этого сделал health.py
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\"" ]
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 10s

  worker:
    build: ./worker
    working_dir: /semantic-search
    volumes:
      - ./worker:/semantic-search/worker
      - ./common:/semantic-search/common
    environment:
      - PYTHONPATH=/semantic-search
    env_file:
      - ./.env
    command: celery -A worker.worker_app:worker_app worker --loglevel=INFO --concurrency=${WORKER_CONCURRENCY} --pool=prefork
    depends_on:
      rabbitmq:
        condition: service_healthy
      database:
        condition: service_healthy

  web-proxy:
    image: nginx:1.27-alpine
    environment:
      - API_BASE_URL=http://web-proxy/api
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/conf.d:/etc/nginx/conf.d:ro

  ui:
    build:
      context: ./ui
    working_dir: /ui
    expose:
      - "8501"
    environment:
      - STREAMLIT_SERVER_RUNONSAVE=true
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501 --server.runOnSave=true --server.fileWatcherType=poll
    #ports:
    #  - "8501:8501"
    depends_on:
      - app
    restart: on-failure
    volumes:
      - ./ui:/ui

volumes:
  postgres_volume:
  rabbitmq_volume:
