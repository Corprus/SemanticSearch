services:
  database:
    image: postgres:16-alpine
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_volume:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost" ]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    env_file:
      - ./.env
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq_volume:/var/lib/rabbitmq
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: ./app
    env_file:
      - ./.env
    volumes:
      - ./app:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8000"
    # Раскомментить для прямого дебага без nginx
    #    ports:
    #      - "8000:8000"
    #Тут healthcheck для самого приложения, для этого сделал health.py
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\"" ]
      interval: 30s
      timeout: 3s
      retries: 10
      start_period: 10s

  web-proxy:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/conf.d:/etc/nginx/conf.d:ro

volumes:
  postgres_volume:
  rabbitmq_volume:
