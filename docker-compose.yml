services:
  database:
    image: postgres:16-alpine
    env_file:
      - ./envs/database.env
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h localhost" ]
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - ./volumes/rabbitmq:/var/lib/rabbitmq
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "rabbitmq-diagnostics -q ping" ]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: ./app
    env_file:
      - ./envs/app.env
      - ./envs/database.env
      - ./envs/rabbitmq.env
    volumes:
      - ./app:/app
    environment:
      - PYTHONPATH=/app
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    expose:
      - "8000"
    # Раскомментить для прямого дебага без nginx
    #    ports:
    #      - "8000:8000"
    #Тут healthcheck для самого приложения, для этого сделал health.py
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()\"" ]

  web-proxy:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./web-proxy/conf.d:/etc/nginx/conf.d:ro
